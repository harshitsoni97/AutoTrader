llm:
  # ── Provider selection ───────────────────────────────────────────────────────
  # Supported providers and their required env vars:
  #   anthropic    → ANTHROPIC_API_KEY
  #   openai       → OPENAI_API_KEY   (GPT-5.x via Chat Completions; see Responses API note below)
  #   openai_o     → OPENAI_API_KEY   (o-series: o1/o3/o4-mini; rejects temperature)
  #   google       → GOOGLE_API_KEY
  #   mistral      → MISTRAL_API_KEY
  #   groq         → GROQ_API_KEY
  #   ollama       → none (local)
  #   azure_openai → AZURE_OPENAI_API_KEY + AZURE_OPENAI_ENDPOINT
  #
  # OpenAI Responses API note:
  #   OpenAI recommends the Responses API over Chat Completions for reasoning models
  #   (better interleaved thinking, tool use, background mode). LangChain's ChatOpenAI
  #   uses Chat Completions — it still works, just without Responses API exclusives.
  #   To use the Responses API directly, replace ChatOpenAI with OpenAI SDK:
  #     client.responses.create(model=..., reasoning={"effort": ...}, input=[...])

  # ── Which agents use which tier ──────────────────────────────────────────────
  # fast     → CatalystIntelligenceAgent (5 calls/day, additive ±10 enrichment, low stakes)
  # analysis → MarketRegimeAgent (1 call/day, HIGH stakes — wrong regime = all signals skewed)
  # report   → OpportunityScoringAgent trade veto + DailyLearningAgent post-market

  # ── Fast tier — catalyst enrichment (low stakes, 5 calls/day) ───────────────
  fast_provider: "openai"
  fast_model: "gpt-5.4 mini"
  fast_max_tokens: 512
  fast_temperature: 0.1
  # Anthropic alternative: fast_provider: "anthropic"  fast_model: "claude-haiku-4-5-20251001"
  # Google alternative:    fast_provider: "google"     fast_model: "gemini-3.1-flash-lite-preview"

  # ── Analysis tier — regime classification (HIGH stakes, 1 call/day) ──────────
  analysis_provider: "anthropic"
  analysis_model: "claude-sonnet-4-6"
  analysis_max_tokens: 1024
  analysis_temperature: 0.2
  # OpenAI alternative: analysis_provider: "openai"  analysis_model: "gpt-5.4"
  # Google alternative: analysis_provider: "google"  analysis_model: "gemini-3.5-flash"  # stable

  # ── Report tier — trade veto gate + daily learning (CRITICAL, 1 call/day) ───
  # This is the last LLM gate before capital is committed. Use your strongest model.
  report_provider: "anthropic"
  report_model: "claude-opus-4-8"
  report_max_tokens: 4096

  # ── Reasoning / thinking config ──────────────────────────────────────────────
  # anthropic: report_thinking_budget > 0 → extended thinking (budget_tokens)
  # google:    report_thinking_budget > 0 → Gemini thinking_budget (tokens)
  # openai:    report_reasoning_effort → GPT-5.x reasoning via reasoning={"effort":...}
  #            API format is correct: extra_body={"reasoning": {"effort": effort}}
  # openai_o:  same effort levels; temperature rejected by o-series
  #
  # OpenAI reasoning effort levels:
  #   ""        → disabled (no reasoning tokens, pure Chat Completions)
  #   none      → latency-critical tasks that need zero reasoning overhead
  #   minimal   → near-zero reasoning, mainly for voice / classification
  #   low       → efficient reasoning; tool-use, planning, multi-step decisions
  #   medium    → balanced quality + latency; default for most workloads
  #   high      → deep planning, complex reasoning — recommended for trade veto gate
  #   xhigh     → deep research / async long rollouts; rarely needed for our use case
  report_thinking_budget: 2000       # anthropic / google
  report_reasoning_effort: "high"    # openai / openai_o — high suits trade veto decisions

  # ── Single-vendor quick-switch examples ──────────────────────────────────────
  # All Anthropic ($1.98/month):
  #   fast: claude-haiku-4-5-20251001 | analysis: claude-sonnet-4-6 | report: claude-opus-4-8 + thinking
  #
  # All OpenAI ($1.34/month):
  #   fast_provider: "openai"   fast_model: "gpt-5.4 mini"
  #   analysis_provider: "openai"  analysis_model: "gpt-5.4"
  #   report_provider: "openai"    report_model: "gpt-5.4"   report_reasoning_effort: "high"
  #
  # All OpenAI max quality ($2.18/month):
  #   report_provider: "openai"  report_model: "gpt-5.5"  report_reasoning_effort: "high"
  #   (gpt-5.5-pro available for highest intelligence, higher latency)
  #
  # All Google ($0.73/month):
  #   fast_provider: "google"     fast_model: "gemini-3.1-flash-lite-preview"
  #   analysis_provider: "google" analysis_model: "gemini-3.5-flash"
  #   report_provider: "google"   report_model: "gemini-3.5-flash"  report_thinking_budget: 2000

  # ── Feature flags ────────────────────────────────────────────────────────────
  enable_catalyst_llm: true
  enable_regime_llm: true
  enable_scoring_llm: true
  enable_report_llm: true

# ── Compete mode ─────────────────────────────────────────────────────────────
# Each stack is a COMPLETE provider configuration: fast + analysis + report tiers.
# The deterministic pipeline (price data, sector scores, RS, volume, technical)
# runs once and is shared. For each stack the coordinator runs:
#   1. Catalyst enrichment    (fast LLM)      → each stack weights catalysts differently
#   2. Regime enrichment      (analysis LLM)  → each stack may read the regime differently
#   3. Score recomputation    (deterministic) → with stack's catalyst + regime inputs
#   4. Scoring review / veto  (analysis LLM)  → each stack picks its top opportunity
# At end of day, compete_evaluator fetches closing prices and ranks stacks by PnL %.
#
# dry_run: true  → all stacks track hypothetically, no real orders
# dry_run: false → primary stack drives real execution; all others tracked
# primary: name of the stack that drives real orders (actual mode only)
compete:
  enabled: true
  dry_run: true
  primary: ""       # e.g. "Anthropic" — only matters when dry_run: false
  stacks:
    # ── Anthropic stack ──────────────────────────────────────────────────────
    # haiku (fast/cheap catalyst scoring) + sonnet (regime + review) + opus+thinking (report)
    - name: "Anthropic"
      fast_provider: "anthropic"
      fast_model: "claude-haiku-4-5-20251001"
      fast_temperature: 0.1
      fast_max_tokens: 512
      analysis_provider: "anthropic"
      analysis_model: "claude-sonnet-4-6"
      analysis_temperature: 0.2
      analysis_max_tokens: 1024
      report_provider: "anthropic"
      report_model: "claude-opus-4-8"
      report_max_tokens: 4096
      report_thinking_budget: 2000

    # ── OpenAI stack ─────────────────────────────────────────────────────────
    # gpt-5.4-mini (fast) + gpt-5.4 (analysis, reasoning=low) + gpt-5.4 (report, reasoning=high)
    - name: "OpenAI"
      fast_provider: "openai"
      fast_model: "gpt-5.4 mini"
      fast_temperature: 0.1
      fast_max_tokens: 512
      analysis_provider: "openai"
      analysis_model: "gpt-5.4"
      analysis_temperature: 0.2
      analysis_max_tokens: 1024
      report_provider: "openai"
      report_model: "gpt-5.4"
      report_max_tokens: 4096
      report_reasoning_effort: "high"

    # ── Google stack ─────────────────────────────────────────────────────────
    # gemini-3.1-flash-lite (fast/cheap) + gemini-3.5-flash (analysis, stable) + gemini-3.5-flash+thinking (report)
    - name: "Google"
      fast_provider: "google"
      fast_model: "gemini-3.1-flash-lite-preview"
      fast_temperature: 0.1
      fast_max_tokens: 512
      analysis_provider: "google"
      analysis_model: "gemini-3.5-flash"
      analysis_temperature: 0.2
      analysis_max_tokens: 1024
      report_provider: "google"
      report_model: "gemini-3.5-flash"
      report_max_tokens: 4096
      report_thinking_budget: 2000

# ── LLMOps ───────────────────────────────────────────────────────────────────
# backend: "langsmith" | "mlflow" | "none"
llmops:
  backend: "none"
  project_name: "autotrader"
  langsmith_endpoint: "https://api.smith.langchain.com"
  mlflow_tracking_uri: "http://localhost:5000"
  push_prompts_to_hub: false
  tags:
    - "nse"
    - "intraday"
    - "production"
