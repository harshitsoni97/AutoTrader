llm:
  # ── Provider selection ───────────────────────────────────────────────────────
  # Each tier (fast / analysis / report) can use a different provider.
  # Supported providers and their required env vars:
  #   anthropic    → ANTHROPIC_API_KEY
  #   openai       → OPENAI_API_KEY
  #   google       → GOOGLE_API_KEY
  #   mistral      → MISTRAL_API_KEY
  #   groq         → GROQ_API_KEY          (fastest free tier)
  #   ollama       → none (local; set OLLAMA_BASE_URL if not localhost:11434)
  #   azure_openai → AZURE_OPENAI_API_KEY + AZURE_OPENAI_ENDPOINT

  # ── Which agents use which tier ──────────────────────────────────────────────
  # fast     → CatalystIntelligenceAgent (5 calls/day, additive enrichment, low stakes)
  # analysis → MarketRegimeAgent (1 call/day, HIGH stakes — regime wrong = all signals wrong)
  # report   → OpportunityScoringAgent trade veto gate + DailyLearningAgent post-market
  #
  # Use your strongest model on report (trade veto) and analysis (regime).
  # Fast tier can be cheap — the deterministic catalyst score is the foundation.

  # ── Fast tier — catalyst enrichment only (low stakes, 5 calls/day) ──────────
  fast_provider: "openai"
  fast_model: "gpt-5.4 mini"           # capable enough for narrative ±10 adjustment
  fast_max_tokens: 512
  fast_temperature: 0.1
  # Google alternative:  fast_provider: "google"  fast_model: "gemini-3.1-flash-lite"
  # Groq alternative:    fast_provider: "groq"    fast_model: "llama-4-scout-17b"

  # ── Analysis tier — regime classification (HIGH stakes, 1 call/day) ──────────
  # Regime is a multiplier on all downstream scoring. Worth the extra $0.01/month.
  analysis_provider: "anthropic"
  analysis_model: "claude-sonnet-4-6"   # best structured output, reliable ±0.10 constraint
  analysis_max_tokens: 1024
  analysis_temperature: 0.2
  # OpenAI alternative:  analysis_provider: "openai"  analysis_model: "gpt-5.4"
  # Google alternative:  analysis_provider: "google"  analysis_model: "gemini-3.1-pro-preview"

  # ── Report tier — trade veto gate + daily learning (CRITICAL, 1 call/day) ───
  # OpportunityScoringAgent runs this BEFORE capital is committed. Use your best.
  # DailyLearningAgent also uses this post-market — low stakes but benefits from depth.
  report_provider: "anthropic"
  report_model: "claude-opus-4-8"       # strongest structured output + extended thinking
  report_max_tokens: 4096
  # Thinking / reasoning — provider-specific:
  #   anthropic → report_thinking_budget > 0 enables extended thinking
  #   openai    → report_reasoning_effort = "low"|"medium"|"high" adds reasoning tokens
  #               gpt-5.4-mini, gpt-5.4, gpt-5.5 ALL support reasoning + temperature together
  #               set "" to disable reasoning (standard completion)
  #   openai_o  → report_reasoning_effort only (o-series rejects temperature entirely)
  #   google    → report_thinking_budget > 0 sets Gemini thinking_budget
  report_thinking_budget: 2000        # anthropic / google: reasoning token budget
  report_reasoning_effort: "medium"   # openai / openai_o: low | medium | high | ""
  #
  # All-OpenAI + reasoning: report_provider: "openai"  report_model: "gpt-5.5"  report_reasoning_effort: "high"
  # OpenAI budget thinking: report_provider: "openai"  report_model: "gpt-5.4 mini"  report_reasoning_effort: "medium"
  # Google thinking:        report_provider: "google"  report_model: "gemini-3.5-flash"  report_thinking_budget: 2000

  # ── Feature flags ────────────────────────────────────────────────────────────
  # Disable any flag to use the pure-deterministic fallback (no API call made).
  enable_catalyst_llm: true
  enable_regime_llm: true
  enable_scoring_llm: true
  enable_report_llm: true

# ── LLMOps ───────────────────────────────────────────────────────────────────
# backend: "langsmith" | "mlflow" | "none"
#   langsmith — requires LANGCHAIN_API_KEY env var
#   mlflow    — requires mlflow server at mlflow_tracking_uri
llmops:
  backend: "none"
  project_name: "autotrader"
  langsmith_endpoint: "https://api.smith.langchain.com"
  mlflow_tracking_uri: "http://localhost:5000"
  push_prompts_to_hub: false
  tags:
    - "nse"
    - "intraday"
    - "production"
